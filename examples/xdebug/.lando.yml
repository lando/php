name: lando-php-xdebug
services:
  # Backward compat: boolean true
  xdebug-true:
    type: php:8.4
    xdebug: true
  # Backward compat: boolean false
  xdebug-false:
    type: php:8.4
    xdebug: false
  # Backward compat: string mode
  xdebug-string:
    type: php:8.4
    xdebug: "debug,develop"
  # New object format
  xdebug-object:
    type: php:8.4
    xdebug:
      mode: debug
      start_with_request: "yes"
      client_port: 9003
  # Object with config pass-through
  xdebug-passthrough:
    type: php:8.4
    xdebug:
      mode: debug
      config:
        max_nesting_level: 256
  # Object format disabled
  xdebug-off-object:
    type: php:8.4
    xdebug:
      mode: "off"

# This is important because it lets lando know to test against the plugin in this repo
# DO NOT REMOVE THIS!
plugins:
  "@lando/php": ../..
